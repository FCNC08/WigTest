<!DOCTYPE html>
<html lang="de">
<head>
 <meta charset="UTF-8">
 <title>Tippspiel-Demo</title>
</head>
<body>
 <h1>Tippspiel-Demo</h1>
 <label>Name:</label>
 <input type="text" id="name"><br><br>
 <label>Team A Name</label>
 <input type="text" onchange="changeName()" id="team_a"/>
 <label id="label_a">Tore Team A:</label>
 <input type="number" id="toreA"><br><br>
 <label>Team B Name</label>
 <input type="text" onchange="changeName()" id="team_b"/>
 <label id="label_b">Tore Team B:</label>
 <input type="number" id="toreB"><br><br>

 <script>
    function changeName(){
        const teamA = document.getElementById("team_a").value;
        const teamB = document.getElementById("team_b").value;
        
        document.getElementById("label_a").innerHTML = "Tore "+teamA;
        document.getElementById("label_b").innerHTML = "Tore "+teamB;
    }
 </script>

 <button onclick="speichern()">Tipp speichern</button>
 <button onclick="laden()">Tipps laden</button>
 <h2>Gespeicherte Tipps</h2>
 <div id="ausgabe"></div>
 <script type="module">
 import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
 const supabaseUrl = "https://cbchdqohnxmprmhyvvpk.supabase.co";
 const supabaseKey = "sb_publishable_yqgHV-QPP0kpECiT2Xl1kg__UJqwx5-";
 const supabase = createClient(supabaseUrl, supabaseKey);
 async function speichern() {
 const name = document.getElementById("name").value;
 const toreA = Number(document.getElementById("toreA").value);
 const toreB = Number(document.getElementById("toreB").value);

 const teamA = document.getElementById("team_a").value;
 const teamB = document.getElementById("team_b").value;
 const { error } = await supabase
 .from("tipps")
 .insert([
 {
 name: name,
 tore_a: toreA,
 tore_b: toreB,
 team_a: teamA,
 team_b: teamB
 }
 ]);
 if (error) {
 document.getElementById("ausgabe").innerHTML =
 "Fehler beim Speichern: " + error.message;
 return;
 }
 document.getElementById("ausgabe").innerHTML = "Tipp gespeichert!";
 //await laden();
 }
 async function laden() {
 const { data, error } = await supabase
 .from("tipps")
 .select("*")
 .order("id", { ascending: true });
 if (error) {
 document.getElementById("ausgabe").innerHTML =
 "Fehler beim Laden: " + error.message;
 return;
 }
 let text = "";
 for (let i = 0; i < data.length; i++) {
 let tipp = data[i];
 text +=
 tipp.name + ": " +
 tipp.team_a + " "+
 tipp.tore_a + " : " + tipp.tore_b + " "+ tipp.team_b +
 "<br>";
 }
 document.getElementById("ausgabe").innerHTML = text;
 }
 window.speichern = speichern;
 window.laden = laden;
 //laden();
 </script>
</body>
</html>
